<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anh Hao Nguyen — CV</title>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:   #000000;
      --body:  #111111;
      --muted: #444444;
      --rule:  #000000;
      --serif: 'EB Garamond', Georgia, 'Times New Roman', serif;
    }

    body {
      background: #d6d0c4;
      font-family: var(--serif);
      color: var(--body);
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 40px 16px 80px;
    }

    /* ── Toolbar ── */
    .toolbar {
      position: fixed;
      top: 20px;
      right: 24px;
      display: flex;
      gap: 10px;
      z-index: 100;
    }
    .btn {
      font-family: var(--serif);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .06em;
      padding: 7px 18px;
      border: 1.5px solid #000;
      background: #000;
      color: #fff;
      cursor: pointer;
      transition: background .15s;
      text-decoration: none;
      display: inline-block;
    }
    .btn:hover { background: #333; }
    .btn.outline { background: transparent; color: #000; }
    .btn.outline:hover { background: #000; color: #fff; }
    .btn:disabled { opacity: .5; cursor: not-allowed; }

    /* ── CV page ── */
    .page {
      background: #fff;
      width: 210mm;
      max-width: 100%;
      padding: 18mm 20mm 18mm 20mm;
      box-shadow: 0 4px 40px rgba(0,0,0,.18);
    }

    /* ── Harvard Header ── */
    .cv-header { text-align: center; margin-bottom: 10px; }
    .cv-name {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: .06em;
      line-height: 1.15;
      color: var(--ink);
      text-transform: uppercase;
    }
    .cv-title {
      font-size: 11px;
      font-weight: 400;
      font-style: italic;
      color: var(--muted);
      margin-top: 3px;
      letter-spacing: .04em;
    }
    .cv-contact {
      margin-top: 7px;
      font-size: 9px;
      color: var(--muted);
      line-height: 1.7;
    }
    .cv-contact a { color: var(--muted); text-decoration: none; }
    .cv-contact a:hover { text-decoration: underline; }
    .cv-contact .sep { margin: 0 7px; }

    /* ── Double rule ── */
    .header-rule      { border: none; border-top: 3px solid var(--rule); margin-top: 10px; margin-bottom: 1px; }
    .header-rule-thin { border: none; border-top: 1px solid var(--rule); margin-bottom: 12px; }

    /* ── Sections ── */
    .section { margin-bottom: 12px; }
    .section-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--ink);
      border-bottom: 1.5px solid var(--ink);
      padding-bottom: 2px;
      margin-bottom: 8px;
    }

    /* ── Profile ── */
    .profile-text { font-size: 9.5px; line-height: 1.7; color: var(--body); text-align: justify; }

    /* ── Skills ── */
    .skills-grid { display: grid; grid-template-columns: 100px 1fr; row-gap: 3px; font-size: 9px; line-height: 1.6; }
    .sk-label { font-weight: 600; color: var(--ink); }
    .sk-value { color: var(--body); }

    /* ── Experience ── */
    .exp-entry {
      margin-bottom: 10px;
      padding-left: 8px;
      border-left: 2px solid #e5e5e5;
    }
    .exp-entry:last-child { margin-bottom: 0; }
    .exp-company-line {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 4px;
    }
    .exp-company { font-size: 10px; font-weight: 700; color: var(--ink); }
    .exp-role    { font-size: 10px; font-weight: 700; font-style: italic; color: var(--ink); }
    .exp-date    { font-size: 9px; font-style: italic; color: var(--muted); white-space: nowrap; flex-shrink: 0; }

    .exp-bullets { list-style: none; margin-bottom: 4px; }
    .exp-bullets li {
      font-size: 9px;
      line-height: 1.65;
      color: var(--body);
      padding-left: 14px;
      position: relative;
      margin-bottom: 1px;
      text-align: justify;
    }
    .exp-bullets li::before { content: '•'; position: absolute; left: 3px; color: var(--ink); font-size: 9px; }

    /* ── Highlighted metrics (numbers, %, $) ── */
    .metric {
      font-weight: 700;
      color: #000;
      background: #fef9c3;          /* soft amber — visible in print */
      padding: 0 1.5px;
      border-radius: 1px;
    }

    /* ── Highlighted tech keywords ── */
    .kw {
      font-weight: 600;
      color: #1a1a1a;
    }

    .exp-tech { font-size: 8.5px; color: var(--muted); font-style: italic; }
    .exp-tech strong { font-weight: 600; font-style: normal; color: var(--ink); }

    .proj-subtitle { font-size: 8.5px; font-style: italic; color: var(--muted); margin-bottom: 4px; line-height: 1.5; }

    /* ── Education ── */
    .edu-entry {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 7px;
      gap: 8px;
    }
    .edu-entry:last-child { margin-bottom: 0; }
    .edu-degree { font-size: 10px; font-weight: 700; color: var(--ink); }
    .edu-inst   { font-size: 9px; font-style: italic; color: var(--muted); margin-top: 1px; }
    .edu-right  { text-align: right; flex-shrink: 0; }
    .edu-date   { font-size: 9px; font-style: italic; color: var(--muted); }
    .edu-grade  { font-size: 9px; font-weight: 700; color: var(--ink); margin-top: 2px; }

    /* ── Grade badge ── */
    .grade-badge {
      display: inline-block;
      font-size: 8px;
      font-weight: 700;
      font-style: normal;
      letter-spacing: .04em;
      padding: 1px 5px;
      border: 1px solid #000;
      border-radius: 2px;
      color: #000;
    }

    /* ── Footer ── */
    .cv-footer {
      border-top: 1px solid #bbb;
      margin-top: 14px;
      padding-top: 5px;
      display: flex;
      justify-content: space-between;
    }
    .cv-footer span { font-size: 7px; color: #bbb; letter-spacing: .12em; text-transform: uppercase; font-style: italic; }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(8px);
      background: rgba(0,0,0,.85);
      color: #fff;
      font-family: var(--serif);
      font-size: 12px;
      padding: 10px 22px;
      border-radius: 4px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s, transform .2s;
      white-space: nowrap;
      z-index: 200;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @media (max-width: 640px) {
      .page { padding: 20px; }
      .toolbar { top: 10px; right: 10px; }
      .exp-company-line { flex-direction: column; gap: 1px; }
      .edu-entry { flex-direction: column; gap: 2px; }
    }
  </style>
</head>
<body>

<div class="toast" id="toast"></div>

<div class="toolbar">
  <button class="btn" id="pdf-btn" onclick="downloadCVAsPDF()">Download PDF</button>
  <a class="btn outline" href="anh_hao_nguyen_cv_data.json" download>Download JSON</a>
</div>

<!-- ── CV page — populated by JS from JSON ── -->
<div class="page" id="cv-page">
  <p style="text-align:center;padding:40px;font-style:italic;color:#999;">Loading CV…</p>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
//  HIGHLIGHT HELPERS
// ═══════════════════════════════════════════════════════════════

// Wrap numbers/percentages/dollar amounts in <mark class="metric">
function highlightMetrics(text) {
  // Match: ~25%, 30%, $12,400, 3+, 15%, 2×, etc.
  return text.replace(
    /(~?\$?[\d,]+\.?\d*\s*[×x%+]?(?:\s*years?)?(?:\s*months?)?|\d+\+?\s*years?)/g,
    function(m) { return '<mark class="metric">' + m + '</mark>'; }
  );
}

// Wrap known tech keywords in <span class="kw">
var TECH_KW = [
  'React Native','React Query','React Bootstrap','React Testing Library',
  'React','Redux Toolkit','Redux','Vue\\.js','Vue','Angular',
  'TypeScript','JavaScript','Python','FastAPI','PostgreSQL',
  'Jest','Vitest','Vite','Webpack','Docker','Azure','CI/CD',
  'Ant Design','Tailwind CSS','Micro-frontend','micro-frontend',
  'React-i18next','RESTful API','REST API','GitHub Copilot','Cursor'
];
var TECH_RE = new RegExp('\\b(' + TECH_KW.join('|') + ')\\b', 'g');
function highlightTech(text) {
  return text.replace(TECH_RE, '<span class="kw">$1</span>');
}

function enhance(text) {
  return highlightTech(highlightMetrics(text));
}

// ═══════════════════════════════════════════════════════════════
//  RENDER — builds the Harvard-style CV from the JSON data object
// ═══════════════════════════════════════════════════════════════
function renderCV(data) {
  var p  = data.personal_information;
  var sk = data.technical_skills;

  // ── Skills rows ─────────────────────────────────────────────
  var skillRows = [
    { label: 'Frontend',    values: sk.frontend },
    { label: 'Languages',   values: sk.languages },
    { label: 'State Mgmt',  values: sk.state_management },
    { label: 'Build Tools', values: sk.build_tooling },
    { label: 'Testing',     values: sk.testing },
    { label: 'Other',       values: sk.other },
  ].map(function(row) {
    return '<span class="sk-label">' + row.label + '</span>'
         + '<span class="sk-value">' + row.values.join(', ') + '</span>';
  }).join('\n');

  // ── Experience entries ───────────────────────────────────────
  function renderExp(jobs) {
    return jobs.map(function(job) {
      var bullets = job.responsibilities.map(function(r) {
        return '<li>' + enhance(r) + '</li>';
      }).join('\n');
      var tech = job.technologies_used
        ? '<p class="exp-tech"><strong>Technologies:</strong> ' + job.technologies_used.join(', ') + '</p>'
        : '';
      var title = job.company
        ? job.company + ' &mdash; <span class="exp-role">' + job.position + '</span>'
        : '<span class="exp-role">' + job.position + '</span>';
      return '<div class="exp-entry">'
        + '<div class="exp-company-line">'
        +   '<span class="exp-company">' + title + '</span>'
        +   '<span class="exp-date">' + job.duration + '</span>'
        + '</div>'
        + '<ul class="exp-bullets">' + bullets + '</ul>'
        + tech
        + '</div>';
    }).join('\n');
  }

  // ── Projects ─────────────────────────────────────────────────
  var projects = (data.personal_projects || []).map(function(proj) {
    var bullets = proj.responsibilities.map(function(r) {
      return '<li>' + enhance(r) + '</li>';
    }).join('\n');
    var subtitle = proj.subtitle || proj.description
      ? '<p class="proj-subtitle">' + (proj.subtitle ? proj.subtitle + ' &middot; ' : '') + (proj.description || '') + '</p>'
      : '';
    var tech = proj.technologies_used
      ? '<p class="exp-tech"><strong>Technologies:</strong> ' + proj.technologies_used.join(', ') + '</p>'
      : '';
    return '<div class="exp-entry">'
      + '<div class="exp-company-line">'
      +   '<span class="exp-company">' + proj.name + (proj.subtitle ? ' &mdash; <span class="exp-role">' + proj.subtitle + '</span>' : '') + '</span>'
      +   '<span class="exp-date">' + proj.duration + '</span>'
      + '</div>'
      + subtitle
      + '<ul class="exp-bullets">' + bullets + '</ul>'
      + tech
      + '</div>';
  }).join('\n');

  // ── Education ────────────────────────────────────────────────
  var education = (data.education || []).map(function(edu) {
    return '<div class="edu-entry">'
      + '<div>'
      +   '<div class="edu-degree">' + edu.degree + '</div>'
      +   '<div class="edu-inst">' + edu.institution + ' &mdash; ' + edu.location + '</div>'
      + '</div>'
      + '<div class="edu-right">'
      +   '<div class="edu-date">' + edu.duration + '</div>'
      +   '<div class="edu-grade"><span class="grade-badge">' + edu.grade + '</span></div>'
      + '</div>'
      + '</div>';
  }).join('\n');

  // ── Assemble full HTML ────────────────────────────────────────
  document.getElementById('cv-page').innerHTML = [

    /* Header */
    '<div class="cv-header">',
    '  <div class="cv-name">' + p.full_name + '</div>',
    '  <div class="cv-title">Frontend Developer &nbsp;&middot;&nbsp; MSc Computer Science Candidate</div>',
    '  <div class="cv-contact">',
    '    <span>' + p.phone + '</span>',
    '    <span class="sep">|</span>',
    '    <a href="mailto:' + p.email + '">' + p.email + '</a>',
    '    <span class="sep">|</span>',
    '    <a href="https://' + p.github + '" target="_blank">' + p.github + '</a>',
    '    <span class="sep">|</span>',
    '    <a href="https://' + p.linkedin + '" target="_blank">' + p.linkedin + '</a>',
    '    <span class="sep">|</span>',
    '    <span>' + p.location + '</span>',
    '  </div>',
    '</div>',

    '<hr class="header-rule" />',
    '<hr class="header-rule-thin" />',

    /* Profile */
    '<section class="section">',
    '  <div class="section-title">Profile</div>',
    '  <p class="profile-text">' + enhance(data.profile) + '</p>',
    '</section>',

    /* Skills */
    '<section class="section">',
    '  <div class="section-title">Technical Skills</div>',
    '  <div class="skills-grid">' + skillRows + '</div>',
    '</section>',

    /* Experience */
    '<section class="section">',
    '  <div class="section-title">Work Experience</div>',
    renderExp(data.work_experience),
    '</section>',

    /* Projects */
    data.personal_projects && data.personal_projects.length
      ? '<section class="section"><div class="section-title">Personal Project</div>' + projects + '</section>'
      : '',

    /* Education */
    '<section class="section">',
    '  <div class="section-title">Education</div>',
    education,
    '</section>',

    /* Footer */
    '<div class="cv-footer">',
    '  <span>' + p.full_name + ' &middot; CV 2025</span>',
    '  <span>Frontend Developer</span>',
    '</div>',

  ].join('\n');
}

// ═══════════════════════════════════════════════════════════════
//  BOOT — fetch JSON and render
// ═══════════════════════════════════════════════════════════════
fetch('anh_hao_nguyen_cv_data.json?v=' + Date.now())
  .then(function(r) { return r.json(); })
  .then(function(data) { renderCV(data); })
  .catch(function(err) {
    document.getElementById('cv-page').innerHTML =
      '<p style="color:red;padding:20px;">Failed to load CV data: ' + err.message + '</p>';
  });

// ═══════════════════════════════════════════════════════════════
//  Toast
// ═══════════════════════════════════════════════════════════════
function showToast(msg, ms) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(function() { t.classList.remove('show'); }, ms || 2000);
}

// ═══════════════════════════════════════════════════════════════
//  PDF download (html2canvas + pdf-lib, clickable links)
// ═══════════════════════════════════════════════════════════════
async function downloadCVAsPDF() {
  var btn = document.getElementById('pdf-btn');
  btn.disabled = true;
  btn.textContent = 'Generating…';
  showToast('Rendering page…', 8000);

  try {
    var cvPage  = document.getElementById('cv-page');
    var pageRect = cvPage.getBoundingClientRect();

    var anchors  = Array.from(cvPage.querySelectorAll('a[href]'));
    var linkData = anchors.map(function(a) {
      var r = a.getBoundingClientRect();
      return { href: a.getAttribute('href'), left: r.left - pageRect.left, top: r.top - pageRect.top, width: r.width, height: r.height };
    });

    var canvas = await html2canvas(cvPage, {
      scale: 2, useCORS: false, logging: false,
      backgroundColor: '#ffffff',
      width: pageRect.width, height: pageRect.height
    });

    var A4_W = 595.28, A4_H = 841.89;
    var pdfDoc = await PDFLib.PDFDocument.create();
    var page   = pdfDoc.addPage([A4_W, A4_H]);

    var imgBytes = (function(dataUrl) {
      var b64 = dataUrl.split(',')[1], bin = atob(b64), bytes = new Uint8Array(bin.length);
      for (var i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
      return bytes;
    })(canvas.toDataURL('image/png'));

    var img = await pdfDoc.embedPng(imgBytes);
    page.drawImage(img, { x: 0, y: 0, width: A4_W, height: A4_H });

    var sx = A4_W / pageRect.width, sy = A4_H / pageRect.height;
    linkData.forEach(function(ld) {
      var x = ld.left * sx, y = (pageRect.height - ld.top - ld.height) * sy, w = ld.width * sx, h = ld.height * sy;
      var uriRef   = pdfDoc.context.register(pdfDoc.context.obj({ Type: 'Action', S: 'URI', URI: PDFLib.PDFString.of(ld.href) }));
      var annotRef = pdfDoc.context.register(pdfDoc.context.obj({ Type: 'Annot', Subtype: 'Link', Rect: [x, y, x+w, y+h], Border: [0,0,0], A: uriRef }));
      page.node.addAnnot(annotRef);
    });

    var blob = new Blob([await pdfDoc.save()], { type: 'application/pdf' });
    var url  = URL.createObjectURL(blob);
    var link = Object.assign(document.createElement('a'), { href: url, download: 'Anh_Hao_Nguyen_CV.pdf' });
    document.body.appendChild(link); link.click(); document.body.removeChild(link);
    setTimeout(function() { URL.revokeObjectURL(url); }, 1000);
    showToast('PDF downloaded — links are clickable!', 3000);

  } catch (err) {
    console.error(err);
    showToast('Error: ' + (err.message || 'PDF generation failed'), 4000);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Download PDF';
  }
}
</script>
</body>
</html>
