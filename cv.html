<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anh Hao Nguyen — CV</title>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:   #000000;
      --body:  #111111;
      --muted: #444444;
      --rule:  #000000;
      --serif: 'EB Garamond', Georgia, 'Times New Roman', serif;

      /* ── Font sizes (edit via settings panel or here) ── */
      --sz-name:    26px;
      --sz-title:   11px;
      --sz-contact: 10.5px;
      --sz-section: 12.5px;
      --sz-profile: 11px;
      --sz-skills:  10.5px;
      --sz-job:     11.5px;
      --sz-date:    10.5px;
      --sz-bullet:  10.5px;
      --sz-tech:    10px;
      --sz-edu:     10.5px;
      --sz-badge:   9.5px;
      --lh-body:    1.65;
    }

    body {
      background: #d6d0c4;
      font-family: var(--serif);
      color: var(--body);
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 40px 16px 80px;
    }

    /* ── Toolbar ── */
    .toolbar {
      position: fixed;
      top: 20px;
      right: 24px;
      display: flex;
      gap: 10px;
      z-index: 100;
      align-items: center;
    }
    .btn {
      font-family: var(--serif);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .06em;
      padding: 7px 18px;
      border: 1.5px solid #000;
      background: #000;
      color: #fff;
      cursor: pointer;
      transition: background .15s;
      text-decoration: none;
      display: inline-block;
    }
    .btn:hover { background: #333; }
    .btn.outline { background: transparent; color: #000; }
    .btn.outline:hover { background: #000; color: #fff; }
    .btn:disabled { opacity: .5; cursor: not-allowed; }

    /* ── Upload label as button ── */
    .btn-upload {
      font-family: var(--serif);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .06em;
      padding: 7px 18px;
      border: 1.5px solid #555;
      background: #fff;
      color: #333;
      cursor: pointer;
      transition: all .15s;
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }
    .btn-upload:hover { background: #f5f5f5; border-color: #000; color: #000; }
    #json-upload { display: none; }

    /* ── CV page ── */
    .page {
      background: #fff;
      width: 210mm;
      max-width: 100%;
      padding: 18mm 20mm 18mm 20mm;
      box-shadow: 0 4px 40px rgba(0,0,0,.18);
    }

    /* ── Harvard Header ── */
    .cv-header { text-align: center; margin-bottom: 10px; }
    .cv-name {
      font-size: var(--sz-name);
      font-weight: 700;
      letter-spacing: .06em;
      line-height: 1.15;
      color: var(--ink);
      text-transform: uppercase;
    }
    .cv-title {
      font-size: var(--sz-title);
      font-weight: 400;
      font-style: italic;
      color: var(--muted);
      margin-top: 3px;
      letter-spacing: .04em;
    }
    .cv-contact {
      margin-top: 7px;
      font-size: var(--sz-contact);
      color: var(--muted);
      line-height: var(--lh-body);
    }
    .cv-contact a { color: var(--muted); text-decoration: none; }
    .cv-contact a:hover { text-decoration: underline; }
    .cv-contact .sep { margin: 0 7px; }

    /* ── Double rule ── */
    .header-rule      { border: none; border-top: 3px solid var(--rule); margin-top: 10px; margin-bottom: 1px; }
    .header-rule-thin { border: none; border-top: 1px solid var(--rule); margin-bottom: 12px; }

    /* ── Sections ── */
    .section { margin-bottom: 12px; }
    .section-title {
      font-size: var(--sz-section);
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--ink);
      border-bottom: 1.5px solid var(--ink);
      padding-bottom: 2px;
      margin-bottom: 8px;
    }

    /* ── Profile ── */
    .profile-text { font-size: var(--sz-profile); line-height: var(--lh-body); color: var(--body); text-align: justify; }

    /* ── Skills ── */
    .skills-grid { display: grid; grid-template-columns: 100px 1fr; row-gap: 3px; font-size: var(--sz-skills); line-height: var(--lh-body); }
    .sk-label { font-weight: 600; color: var(--ink); }
    .sk-value { color: var(--body); }

    /* ── Experience ── */
    .exp-entry {
      margin-bottom: 10px;
      padding-left: 8px;
      border-left: 2px solid #e5e5e5;
    }
    .exp-entry:last-child { margin-bottom: 0; }
    .exp-company-line {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 4px;
    }
    .exp-company { font-size: var(--sz-job); font-weight: 700; color: var(--ink); }
    .exp-role    { font-size: var(--sz-job); font-weight: 700; font-style: italic; color: var(--ink); }
    .exp-date    { font-size: var(--sz-date); font-style: italic; color: var(--muted); white-space: nowrap; flex-shrink: 0; }

    .exp-bullets { list-style: none; margin-bottom: 4px; }
    .exp-bullets li {
      font-size: var(--sz-bullet);
      line-height: var(--lh-body);
      color: var(--body);
      padding-left: 14px;
      position: relative;
      margin-bottom: 1px;
      text-align: justify;
    }
    .exp-bullets li::before { content: '•'; position: absolute; left: 3px; color: var(--ink); font-size: var(--sz-bullet); }

    /* ── Explicit hl{...} markers in JSON content ── */
    .hl {
      background: #fef9c3;
      padding: 0 1.5px;
      border-radius: 1px;
    }

    .exp-tech { font-size: var(--sz-tech); color: var(--muted); font-style: italic; }
    .exp-tech strong { font-weight: 600; font-style: normal; color: var(--ink); }

    .proj-company-tag { font-weight: 400; font-style: italic; color: var(--muted); font-size: var(--sz-date); }

    .proj-subtitle { font-size: var(--sz-tech); font-style: italic; color: var(--muted); margin-bottom: 4px; line-height: var(--lh-body); }

    /* ── Education ── */
    .edu-entry {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 7px;
      gap: 8px;
    }
    .edu-entry:last-child { margin-bottom: 0; }
    .edu-degree { font-size: var(--sz-job); font-weight: 700; color: var(--ink); }
    .edu-inst   { font-size: var(--sz-edu); font-style: italic; color: var(--muted); margin-top: 1px; }
    .edu-right  { text-align: right; flex-shrink: 0; }
    .edu-date   { font-size: var(--sz-date); font-style: italic; color: var(--muted); }
    .edu-grade  { font-size: var(--sz-edu); font-weight: 700; color: var(--ink); margin-top: 2px; }

    /* ── Grade badge ── */
    .grade-badge {
      display: inline-block;
      font-size: var(--sz-badge);
      font-weight: 700;
      font-style: normal;
      letter-spacing: .04em;
      padding: 1px 5px;
      border: 1px solid #000;
      border-radius: 2px;
      color: #000;
    }

    /* ── Footer ── */
    .cv-footer {
      border-top: 1px solid #bbb;
      margin-top: 14px;
      padding-top: 5px;
      display: flex;
      justify-content: space-between;
    }
    .cv-footer span { font-size: 7px; color: #bbb; letter-spacing: .12em; text-transform: uppercase; font-style: italic; }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(8px);
      background: rgba(0,0,0,.85);
      color: #fff;
      font-family: var(--serif);
      font-size: 12px;
      padding: 10px 22px;
      border-radius: 4px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s, transform .2s;
      white-space: nowrap;
      z-index: 200;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── Settings panel ── */
    .settings-panel {
      position: fixed;
      top: 60px;
      left: 20px;
      background: #fff;
      border: 1.5px solid #000;
      padding: 16px 18px;
      width: 220px;
      z-index: 100;
      font-family: var(--serif);
      font-size: 11px;
      box-shadow: 2px 2px 0 #000;
    }
    .settings-panel.hidden { display: none; }
    .settings-panel h3 {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      margin-bottom: 12px;
      border-bottom: 1px solid #000;
      padding-bottom: 6px;
    }
    .settings-row { margin-bottom: 10px; }
    .settings-row label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 3px;
      color: #444;
    }
    .settings-row label span { font-weight: 700; color: #000; min-width: 36px; text-align: right; }
    .settings-row input[type=range] { width: 100%; accent-color: #000; cursor: pointer; }
    .settings-reset {
      width: 100%;
      margin-top: 4px;
      font-family: var(--serif);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .06em;
      padding: 5px;
      border: 1px solid #000;
      background: transparent;
      cursor: pointer;
    }
    .settings-reset:hover { background: #000; color: #fff; }
    @media print {
      .settings-panel, .toolbar, .toast { display: none !important; }
      body { background: #fff; padding: 0; }
      .page { box-shadow: none; width: 100%; padding: 12mm 16mm; }
      @page { size: A4; margin: 0; }
    }

    @media (max-width: 640px) {
      .page { padding: 20px; }
      .toolbar { top: 10px; right: 10px; }
      .exp-company-line { flex-direction: column; gap: 1px; }
      .edu-entry { flex-direction: column; gap: 2px; }
    }
  </style>
</head>
<body>

<div class="toast" id="toast"></div>

<div class="settings-panel hidden" id="settings-panel">
  <h3>Font Settings</h3>
  <div class="settings-row">
    <label>Body text <span id="val-body"></span></label>
    <input type="range" id="sl-body" min="8" max="18" step="0.5" oninput="applySettings()">
  </div>
  <div class="settings-row">
    <label>Headings <span id="val-job"></span></label>
    <input type="range" id="sl-job" min="9" max="22" step="0.5" oninput="applySettings()">
  </div>
  <div class="settings-row">
    <label>Section titles <span id="val-section"></span></label>
    <input type="range" id="sl-section" min="9" max="20" step="0.5" oninput="applySettings()">
  </div>
  <div class="settings-row">
    <label>Name <span id="val-name"></span></label>
    <input type="range" id="sl-name" min="16" max="40" step="0.5" oninput="applySettings()">
  </div>
  <div class="settings-row">
    <label>Line height <span id="val-lh"></span></label>
    <input type="range" id="sl-lh" min="1.3" max="2.2" step="0.05" oninput="applySettings()">
  </div>
  <button class="settings-reset" onclick="resetSettings()">Reset to defaults</button>
</div>

<div class="toolbar">
  <a class="btn outline" href="index.html">← Portfolio</a>
  <button class="btn outline" onclick="toggleSettings()">⚙ Font</button>
  <label class="btn-upload" title="Upload a JSON file to preview a tailored CV">
    ↑ Upload JSON
    <input type="file" id="json-upload" accept=".json" onchange="handleJSONUpload(event)" />
  </label>
  <a class="btn outline" href="anh_hao_nguyen_cv_data.json" download>Download JSON</a>
  <button class="btn" onclick="window.print()">Save as PDF</button>
</div>

<!-- ── CV page — populated by JS from JSON ── -->
<div class="page" id="cv-page">
  <p style="text-align:center;padding:40px;font-style:italic;color:#999;">Loading CV…</p>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
//  HIGHLIGHT HELPER
// ═══════════════════════════════════════════════════════════════

function enhance(text) {
  return text.replace(/hl\{([^}]+)\}/g, '<span class="hl">$1</span>');
}

// ═══════════════════════════════════════════════════════════════
//  SECTION RENDERERS
//  Add a new key to register a new section type.
//  Each key: { default: fn, [styleName]: fn }
//  Style is set per-section in the JSON: { "id": "skills", "style": "tags" }
// ═══════════════════════════════════════════════════════════════

var RENDERERS = {};

RENDERERS.profile = {
  default: function(data) {
    if (!data.profile) return '';
    return '<section class="section">'
      + '<div class="section-title">Profile</div>'
      + '<p class="profile-text">' + enhance(data.profile) + '</p>'
      + '</section>';
  }
};

RENDERERS.skills = {
  default: function(data) {
    var sk = data.technical_skills || {};
    var rows;
    if (Array.isArray(data.skills)) {
      rows = data.skills
        .filter(function(r) { return r.label && r.values && r.values.length; })
        .map(function(r) {
          return '<span class="sk-label">' + r.label + '</span>'
               + '<span class="sk-value">' + r.values.join(', ') + '</span>';
        }).join('');
    } else {
      rows = [
        { label: 'Frontend',    values: sk.frontend         || [] },
        { label: 'Languages',   values: sk.languages        || [] },
        { label: 'State Mgmt',  values: sk.state_management || [] },
        { label: 'Build Tools', values: sk.build_tooling    || [] },
        { label: 'Testing',     values: sk.testing          || [] },
        { label: 'Other',       values: sk.other            || [] },
      ].filter(function(r) { return r.values.length; })
       .map(function(r) {
         return '<span class="sk-label">' + r.label + '</span>'
              + '<span class="sk-value">' + r.values.join(', ') + '</span>';
       }).join('');
    }
    return '<section class="section">'
      + '<div class="section-title">' + (data.skills_section_title || 'Technical Skills') + '</div>'
      + '<div class="skills-grid">' + rows + '</div>'
      + '</section>';
  }
};

RENDERERS.education = {
  default: function(data) {
    var ed = data.education || [];
    if (!ed.length) return '';
    var rows = ed.map(function(e) {
      return '<div class="edu-entry">'
        + '<div>'
        +   '<div class="edu-degree">' + e.degree + '</div>'
        +   '<div class="edu-inst">' + e.institution + ' &mdash; ' + e.location + '</div>'
        + '</div>'
        + '<div class="edu-right">'
        +   '<div class="edu-date">' + e.duration + '</div>'
        +   (e.grade ? '<div class="edu-grade"><span class="grade-badge">' + e.grade + '</span></div>' : '')
        + '</div>'
        + '</div>';
    }).join('');
    return '<section class="section">'
      + '<div class="section-title">Education</div>'
      + rows
      + '</section>';
  }
};

RENDERERS.experience = {
  default: function(data) {
    var xp = data.work_experience || [];
    if (!xp.length) return '';
    var entries = xp.map(function(job) {
      var bullets = (job.responsibilities || []).map(function(r) {
        return '<li>' + enhance(r) + '</li>';
      }).join('');
      var tech = job.technologies_used && job.technologies_used.length
        ? '<p class="exp-tech"><strong>Technologies:</strong> ' + job.technologies_used.join(', ') + '</p>'
        : '';
      var title = job.company
        ? job.company + ' &mdash; <span class="exp-role">' + job.position + '</span>'
        : '<span class="exp-role">' + job.position + '</span>';
      return '<div class="exp-entry">'
        + '<div class="exp-company-line">'
        +   '<span class="exp-company">' + title + '</span>'
        +   '<span class="exp-date">' + job.duration + '</span>'
        + '</div>'
        + '<ul class="exp-bullets">' + bullets + '</ul>'
        + tech
        + '</div>';
    }).join('');
    return '<section class="section">'
      + '<div class="section-title">Work Experience</div>'
      + entries
      + '</section>';
  }
};

RENDERERS.personal_projects = {
  default: function(data) {
    var pj = data.personal_projects || [];
    if (!pj.length) return '';
    var entries = pj.map(function(proj) {
      var bullets = (proj.responsibilities || []).map(function(r) {
        return '<li>' + enhance(r) + '</li>';
      }).join('');
      var subtitle = proj.subtitle || proj.description
        ? '<p class="proj-subtitle">'
            + (proj.subtitle ? proj.subtitle + ' &middot; ' : '')
            + (proj.description || '')
            + '</p>'
        : '';
      var tech = proj.technologies_used && proj.technologies_used.length
        ? '<p class="exp-tech"><strong>Technologies:</strong> ' + proj.technologies_used.join(', ') + '</p>'
        : '';
      return '<div class="exp-entry">'
        + '<div class="exp-company-line">'
        +   '<span class="exp-company">' + proj.name
        +     (proj.subtitle ? ' &mdash; <span class="exp-role">' + proj.subtitle + '</span>' : '')
        +   '</span>'
        +   '<span class="exp-date">' + proj.duration + '</span>'
        + '</div>'
        + subtitle
        + '<ul class="exp-bullets">' + bullets + '</ul>'
        + tech
        + '</div>';
    }).join('');
    return '<section class="section">'
      + '<div class="section-title">Personal Project</div>'
      + entries
      + '</section>';
  }
};

RENDERERS.company_projects = {
  default: function(data) {
    var xp = data.work_experience || [];
    var entries = [];
    xp.forEach(function(job) {
      (job.projects || []).forEach(function(proj) {
        var bullets = (proj.responsibilities || []).map(function(r) {
          return '<li>' + enhance(r) + '</li>';
        }).join('');
        var tech = proj.technologies_used && proj.technologies_used.length
          ? '<p class="exp-tech"><strong>Technologies:</strong> ' + proj.technologies_used.join(', ') + '</p>'
          : '';
        var desc = proj.description
          ? '<p class="proj-subtitle">' + proj.description + '</p>' : '';
        entries.push('<div class="exp-entry">'
          + '<div class="exp-company-line">'
          +   '<span class="exp-company">' + proj.name
          +     ' <span class="proj-company-tag">@ ' + job.company + '</span>'
          +   '</span>'
          +   '<span class="exp-date">' + job.duration + '</span>'
          + '</div>'
          + desc
          + '<ul class="exp-bullets">' + bullets + '</ul>'
          + tech
          + '</div>');
      });
    });
    if (!entries.length) return '';
    return '<section class="section">'
      + '<div class="section-title">Projects</div>'
      + entries.join('')
      + '</section>';
  }
};

// ═══════════════════════════════════════════════════════════════
//  DEFAULT SECTION ORDER
//  Used when the JSON has no "sections" key.
// ═══════════════════════════════════════════════════════════════

var DEFAULT_SECTIONS = [
  { id: 'profile' },
  { id: 'skills' },
  { id: 'education' },
  { id: 'experience' },
  { id: 'personal_projects' }
];

// ═══════════════════════════════════════════════════════════════
//  RENDER — section order and style driven by data.sections
// ═══════════════════════════════════════════════════════════════

function renderCV(data) {
  var p = data.personal_information;

  var parts = [];
  if (p.phone)     parts.push('<span>' + p.phone + '</span>');
  if (p.email)     parts.push('<a href="mailto:' + p.email + '">' + p.email + '</a>');
  if (p.github)    parts.push('<a href="https://' + p.github + '" target="_blank">' + p.github + '</a>');
  if (p.linkedin)  parts.push('<a href="https://' + p.linkedin + '" target="_blank">' + p.linkedin + '</a>');
  if (p.portfolio) parts.push('<a href="https://' + p.portfolio + '" target="_blank">' + p.portfolio + '</a>');
  if (p.location)  parts.push('<span>' + p.location + '</span>');

  var html = '<div class="cv-header">'
    + '<div class="cv-name">' + p.full_name + '</div>'
    + (data.cv_subtitle ? '<div class="cv-title">' + data.cv_subtitle + '</div>' : '')
    + '<div class="cv-contact">' + parts.join('<span class="sep">|</span>') + '</div>'
    + '</div>'
    + '<hr class="header-rule" />'
    + '<hr class="header-rule-thin" />';

  var sections = data.sections || DEFAULT_SECTIONS;
  sections.forEach(function(sec) {
    var id    = typeof sec === 'string' ? sec : sec.id;
    var style = (typeof sec === 'object' && sec.style) ? sec.style : 'default';
    var renderer = RENDERERS[id];
    if (renderer) {
      var fn = renderer[style] || renderer['default'];
      if (fn) html += fn(data);
    }
  });

  html += '<div class="cv-footer">'
    + '<span>' + p.full_name + ' &middot; ' + (data.cv_year || 'CV 2026') + '</span>'
    + '<span>' + (data.cv_role || 'Frontend Developer') + '</span>'
    + '</div>';

  document.getElementById('cv-page').innerHTML = html;
}

// ═══════════════════════════════════════════════════════════════
//  BOOT
// ═══════════════════════════════════════════════════════════════

fetch('anh_hao_nguyen_cv_data.json?v=' + Date.now())
  .then(function(r) { return r.json(); })
  .then(function(data) { renderCV(data); initSettings(); })
  .catch(function(err) {
    document.getElementById('cv-page').innerHTML =
      '<p style="color:red;padding:20px;">Failed to load CV data: ' + err.message + '</p>';
  });

// ═══════════════════════════════════════════════════════════════
//  UPLOAD
// ═══════════════════════════════════════════════════════════════

function handleJSONUpload(event) {
  var file = event.target.files[0];
  if (!file) return;
  if (!file.name.endsWith('.json')) { showToast('Please upload a .json file', 3000); return; }
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var data = JSON.parse(e.target.result);
      renderCV(data);
      showToast('✓ CV updated from ' + file.name, 3000);
    } catch (err) {
      showToast('Invalid JSON: ' + err.message, 4000);
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

// ═══════════════════════════════════════════════════════════════
//  Toast
// ═══════════════════════════════════════════════════════════════

function showToast(msg, ms) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(function() { t.classList.remove('show'); }, ms || 2000);
}

// ═══════════════════════════════════════════════════════════════
//  FONT SETTINGS PANEL
// ═══════════════════════════════════════════════════════════════

var DEFAULTS = { body: 10.5, job: 11.5, section: 12.5, name: 26, lh: 1.65 };

function initSettings() {
  var s = JSON.parse(localStorage.getItem('cvFontSettings') || 'null') || DEFAULTS;
  document.getElementById('sl-body').value    = s.body;
  document.getElementById('sl-job').value     = s.job;
  document.getElementById('sl-section').value = s.section;
  document.getElementById('sl-name').value    = s.name;
  document.getElementById('sl-lh').value      = s.lh;
  applySettings();
}

function applySettings() {
  var body    = parseFloat(document.getElementById('sl-body').value);
  var job     = parseFloat(document.getElementById('sl-job').value);
  var section = parseFloat(document.getElementById('sl-section').value);
  var name    = parseFloat(document.getElementById('sl-name').value);
  var lh      = parseFloat(document.getElementById('sl-lh').value);

  var r = document.documentElement.style;
  r.setProperty('--sz-profile', body    + 'px');
  r.setProperty('--sz-bullet',  body    + 'px');
  r.setProperty('--sz-skills',  body    + 'px');
  r.setProperty('--sz-contact', body    + 'px');
  r.setProperty('--sz-edu',     body    + 'px');
  r.setProperty('--sz-date',    body    + 'px');
  r.setProperty('--sz-tech',    (body - 0.5) + 'px');
  r.setProperty('--sz-job',     job     + 'px');
  r.setProperty('--sz-section', section + 'px');
  r.setProperty('--sz-name',    name    + 'px');
  r.setProperty('--lh-body',    lh);

  document.getElementById('val-body').textContent    = body    + 'px';
  document.getElementById('val-job').textContent     = job     + 'px';
  document.getElementById('val-section').textContent = section + 'px';
  document.getElementById('val-name').textContent    = name    + 'px';
  document.getElementById('val-lh').textContent      = lh;

  localStorage.setItem('cvFontSettings', JSON.stringify({ body, job, section, name, lh }));
}

function resetSettings() {
  localStorage.removeItem('cvFontSettings');
  document.getElementById('sl-body').value    = DEFAULTS.body;
  document.getElementById('sl-job').value     = DEFAULTS.job;
  document.getElementById('sl-section').value = DEFAULTS.section;
  document.getElementById('sl-name').value    = DEFAULTS.name;
  document.getElementById('sl-lh').value      = DEFAULTS.lh;
  applySettings();
}

function toggleSettings() {
  document.getElementById('settings-panel').classList.toggle('hidden');
}

</script>
